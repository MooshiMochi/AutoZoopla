name: Release (macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    # Native builds per architecture: Intel on macos-13, Apple Silicon on
    # macos-14. Intel runners can queue for a long time; fail-fast: false lets
    # arm64 finish independently.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel   # Intel
            arch: x86_64
          - runner: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[build,macos]"

      - name: Build .app
        run: pyinstaller packaging/AutoZoopla.spec

      - name: Verify built architecture
        run: |
          echo "Python arch: $(python -c 'import platform; print(platform.machine())')"
          lipo -archs dist/AutoZoopla.app/Contents/MacOS/AutoZoopla || \
            file dist/AutoZoopla.app/Contents/MacOS/AutoZoopla

      - name: Prune unused Qt helper apps
        run: |
          # Assistant/Designer/Linguist are Qt dev tools we never use. Their
          # nested .app bundles have symlinked executables that break codesign
          # (and their pre-signed seals break Sparkle's appcast check).
          PYSIDE="dist/AutoZoopla.app/Contents/Frameworks/PySide6"
          for tool in Assistant Designer Linguist; do
            rm -rf "$PYSIDE/${tool}.app" "$PYSIDE/${tool}__dot__app"
          done
          find "$PYSIDE" -maxdepth 1 \( -name '*.app' -o -name '*__dot__app' \) \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Read version
        id: version
        run: |
          V=$(python -c 'import runpy,os; print(runpy.run_path(os.path.join("src","relister","__version__.py"))["__version__"])')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Point app at its per-arch appcast
        run: |
          # Sparkle can't put two same-version archives in one appcast, so each
          # architecture updates from its own feed. Must happen before codesign.
          plutil -replace SUFeedURL -string \
            "https://github.com/${{ github.repository }}/releases/latest/download/appcast-${{ matrix.arch }}.xml" \
            dist/AutoZoopla.app/Contents/Info.plist

      - name: Bundle Sparkle.framework
        env:
          SPARKLE_VERSION: "2.6.4"
        run: |
          # The updater loads Sparkle.framework from the app's Frameworks dir;
          # it must be embedded (and signed as part of the bundle below).
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-dist
          tar -xf sparkle.tar.xz -C sparkle-dist
          mkdir -p "dist/AutoZoopla.app/Contents/Frameworks"
          cp -R sparkle-dist/Sparkle.framework \
            "dist/AutoZoopla.app/Contents/Frameworks/"

      - name: Codesign app
        run: |
          # Sparkle's generate_appcast verifies the bundle's code signature. The
          # app embeds pre-signed PySide6 helper apps, so an *unsigned* outer
          # bundle fails validation. Sign it: Developer ID when available,
          # otherwise ad-hoc so the seal is valid.
          if [ -n "$APPLE_DEVELOPER_ID" ]; then
            codesign --deep --force --options runtime \
              --entitlements packaging/entitlements.plist \
              --sign "$APPLE_DEVELOPER_ID" dist/AutoZoopla.app
          else
            echo "No APPLE_DEVELOPER_ID secret; applying an ad-hoc signature."
            codesign --deep --force --sign - dist/AutoZoopla.app
          fi
          codesign --verify --verbose dist/AutoZoopla.app

      - name: Smoke-launch the built app
        run: |
          # Launch the packaged binary headlessly, capture its console output,
          # and fail if it crashes OR logs any error during the first seconds.
          # This catches import/bundling crashes AND non-fatal startup errors
          # (like the Sparkle framework load failure).
          export QT_QPA_PLATFORM=offscreen
          # Don't trigger the first-launch browser download during the smoke.
          export AUTOZOOPLA_SKIP_BROWSER_SETUP=1
          LOG=smoke.log
          "dist/AutoZoopla.app/Contents/MacOS/AutoZoopla" >"$LOG" 2>&1 &
          PID=$!
          sleep 8
          RUNNING=1
          kill -0 "$PID" 2>/dev/null || RUNNING=0
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

          echo "----- captured startup output -----"
          cat "$LOG" || true
          echo "-----------------------------------"

          if [ "$RUNNING" -ne 1 ]; then
            echo "App exited early -> launch FAILED."
            exit 1
          fi
          # Anchor to our log format ("LEVEL name: msg") plus Python tracebacks,
          # so we don't false-positive on Qt/native "error" chatter.
          if grep -qE "Traceback \(most recent call last\)|^(ERROR|CRITICAL) " "$LOG"; then
            echo "Error output detected during startup -> FAILED."
            exit 1
          fi
          echo "App launched cleanly with no error output -> OK."

      - name: Build DMG and PKG (arch-tagged)
        run: |
          V="${{ steps.version.outputs.version }}"
          A="${{ matrix.arch }}"
          bash packaging/make_dmg.sh "$V"
          bash packaging/make_pkg.sh "$V"
          mv "dist/AutoZoopla-$V.dmg" "dist/AutoZoopla-$V-$A.dmg"
          mv "dist/AutoZoopla-$V.pkg" "dist/AutoZoopla-$V-$A.pkg"

      - name: Notarize DMG
        if: ${{ env.APPLE_ID != '' }}
        run: |
          DMG="dist/AutoZoopla-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$DMG"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            dist/AutoZoopla-*.dmg
            dist/AutoZoopla-*.pkg

  release:
    needs: build
    runs-on: macos-latest
    env:
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming
          merge-multiple: true

      - name: Separate DMGs (for the appcast) from PKGs
        run: |
          mkdir -p dist pkgs
          find incoming -name '*.dmg' -exec mv {} dist/ \;
          find incoming -name '*.pkg' -exec mv {} pkgs/ \;
          ls -la dist pkgs

      - name: Download Sparkle tools
        if: ${{ env.SPARKLE_PRIVATE_KEY != '' }}
        env:
          SPARKLE_VERSION: "2.6.4"
        run: |
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools
          echo "SPARKLE_BIN=$PWD/sparkle-tools/bin" >> "$GITHUB_ENV"

      - name: Sign updates and generate per-arch appcasts (Sparkle)
        if: ${{ env.SPARKLE_PRIVATE_KEY != '' }}
        run: |
          # Sparkle rejects two same-version archives in one feed, so generate a
          # separate appcast per architecture (each from a dir with only its DMG).
          # Enclosure URLs stay relative -> resolved against the feed's
          # releases/latest/download/ base, so they always point at the newest DMG.
          printf '%s' "$SPARKLE_PRIVATE_KEY" > sparkle_private_key
          for arch in x86_64 arm64; do
            dmg=$(ls dist/AutoZoopla-*-"$arch".dmg 2>/dev/null || true)
            [ -n "$dmg" ] || { echo "No DMG for $arch; skipping."; continue; }
            mkdir -p "feed-$arch"
            cp "$dmg" "feed-$arch/"
            "$SPARKLE_BIN/generate_appcast" --ed-key-file sparkle_private_key "feed-$arch/"
            # generate_appcast names the file after the app's SUFeedURL basename
            # (e.g. appcast-x86_64.xml), so copy whatever appcast it produced.
            cp feed-$arch/appcast*.xml "dist/appcast-$arch.xml"
          done
          rm -f sparkle_private_key
          ls -la dist/appcast-*.xml

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AutoZoopla-*.dmg
            pkgs/AutoZoopla-*.pkg
            dist/appcast-*.xml
